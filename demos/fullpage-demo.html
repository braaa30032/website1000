<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDS Grid Structure</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullpage.js@4/dist/fullpage.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, Helvetica, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        :root { --sq: 25vmin; }

        /* ── Nav Corners (fixed, red) ── */
        .corner {
            position: fixed; z-index: 200;
            width: var(--sq); height: var(--sq);
            background: #e94560;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer;
            transition: filter 0.2s;
        }
        .corner:hover { filter: brightness(1.2); }
        .corner.off { opacity: 0.2; pointer-events: none; }
        .corner.tl { top: 0; left: 0; align-items: flex-start; justify-content: flex-start; }
        .corner.tr { top: 0; right: 0; align-items: flex-start; justify-content: flex-end; }
        .corner.bl { bottom: 0; left: 0; align-items: flex-end; justify-content: flex-start; }
        .corner.br { bottom: 0; right: 0; align-items: flex-end; justify-content: flex-end; }
        .corner-label {
            color: #fff; font-weight: 900; line-height: 0.95;
            padding: 12%; font-size: calc(var(--sq) * 0.28);
            word-break: break-all; text-transform: lowercase;
        }

        /* ── Edge Strips (between corners, primary bg) ── */
        .edge { position: fixed; z-index: 190; background: #1a1a2e; pointer-events: none; }
        .edge-t { top: 0; left: var(--sq); right: var(--sq); height: var(--sq); }
        .edge-b { bottom: 0; left: var(--sq); right: var(--sq); height: var(--sq); }
        .edge-l { top: var(--sq); bottom: var(--sq); left: 0; width: var(--sq); }
        .edge-r { top: var(--sq); bottom: var(--sq); right: 0; width: var(--sq); }

        /* ── Flash Overlay ── */
        #flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 250; pointer-events: none;
            box-shadow: none; transition: box-shadow 0.3s ease;
        }
        #flash.right  { box-shadow: inset -20px 0 30px rgba(255,0,0,0.5); }
        #flash.left   { box-shadow: inset 20px 0 30px rgba(255,0,0,0.5); }
        #flash.top    { box-shadow: inset 0 20px 30px rgba(255,0,0,0.5); }
        #flash.bottom { box-shadow: inset 0 -20px 30px rgba(255,0,0,0.5); }

        /* ── Content inner (between corners) ── */
        .section { background: #1a1a2e !important; }
        .page-inner {
            position: absolute;
            top: var(--sq); left: var(--sq);
            width: calc(100% - 2 * var(--sq));
            height: calc(100% - 2 * var(--sq));
        }

        /* ── Grid cells ── */
        .g {
            display: grid; gap: 4px;
            width: 100%; height: 100%;
        }
        .cell {
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 14px;
            text-align: center; line-height: 1.5;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            padding: 8px;
        }
        .cell small { display: block; font-size: 10px; opacity: 0.5; font-weight: 400; }

        /* ── Grid: Ch0 P0 — GRAY — 2 cols (3:2), 1 section ── */
        .g-ch0p0 {
            grid-template-columns: 3fr 2fr;
            grid-template-rows: 1fr;
        }
        .g-ch0p0 .cell { background: #bbb; }
        .g-ch0p0 .cell.sub { background: #999; }

        /* ── Grid: Ch0 P1 — YELLOW — 2 cols (2:3), main spans 2 rows ── */
        .g-ch0p1 {
            grid-template-columns: 2fr 3fr;
            grid-template-rows: 2fr 1fr;
        }
        .g-ch0p1 .cell { background: #e8d44d; }
        .g-ch0p1 .cell.main { grid-row: 1 / 3; background: #ddc940; }

        /* ── Grid: Ch1 P0 — GREEN — 2 cols (3:2), 2 sections (2 rows) ── */
        .g-ch1p0 {
            grid-template-columns: 3fr 2fr;
            grid-template-rows: 1fr 1fr;
        }
        .g-ch1p0 .cell { background: #3cb371; }
        .g-ch1p0 .cell.sub { background: #2e8b57; }

        /* ── Grid: Ch1 P1 — CYAN — 3 equal cols, 1 section ── */
        .g-ch1p1 {
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr;
        }
        .g-ch1p1 .cell { background: #2bbcc4; }
        .g-ch1p1 .cell:nth-child(2) { background: #239da4; }
        .g-ch1p1 .cell:nth-child(3) { background: #1b7d84; }

        /* ── fullpage overrides ── */
        #fp-nav, .fp-slidesNav, .fp-controlArrow { display: none !important; }
        .fp-watermark { opacity: 0.05 !important; }

        /* ── Position label (top edge center) ── */
        #pos {
            position: fixed; z-index: 195;
            top: calc(var(--sq) * 0.35); left: 50%;
            transform: translateX(-50%);
            font-size: 11px; font-weight: 600;
            color: rgba(255,255,255,0.2);
            pointer-events: none; letter-spacing: 1px;
            font-family: 'SF Mono', monospace;
        }
    </style>
</head>
<body>

    <!-- Flash -->
    <div id="flash"></div>

    <!-- Edge Strips -->
    <div class="edge edge-t"></div>
    <div class="edge edge-b"></div>
    <div class="edge edge-l"></div>
    <div class="edge edge-r"></div>

    <!-- Nav Corners -->
    <div class="corner tl" id="c-tl"><span class="corner-label" id="l-tl"></span></div>
    <div class="corner tr" id="c-tr"><span class="corner-label" id="l-tr"></span></div>
    <div class="corner bl" id="c-bl"><span class="corner-label" id="l-bl"></span></div>
    <div class="corner br" id="c-br"><span class="corner-label" id="l-br"></span></div>

    <!-- Position -->
    <div id="pos"></div>

    <!-- ═══════════════════════════════════════
         FULLPAGE
         Sections = Pages (vertical ↕)
         Slides = Chapters (horizontal ↔)
         ═══════════════════════════════════════ -->
    <div id="fullpage">

        <!-- ── Page 0 (Section 0) ── -->
        <div class="section">

            <!-- Ch0 P0: GRAY — 2 cols (3:2), 1 section -->
            <div class="slide" data-anchor="ch0p0">
                <div class="page-inner">
                    <div class="g g-ch0p0">
                        <div class="cell main">main1<small>page1 · section1</small></div>
                        <div class="cell sub">sub1<small>page1 · section1</small></div>
                    </div>
                </div>
            </div>

            <!-- Ch1 P0: GREEN — 2 cols (3:2), 2 sections -->
            <div class="slide" data-anchor="ch1p0">
                <div class="page-inner">
                    <div class="g g-ch1p0">
                        <div class="cell main">main1<small>page1 · section1</small></div>
                        <div class="cell sub">sub1<small>page1 · section1</small></div>
                        <div class="cell main">main1<small>page1 · section2</small></div>
                        <div class="cell sub">sub1<small>page1 · section2</small></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ── Page 1 (Section 1) ── -->
        <div class="section">

            <!-- Ch0 P1: YELLOW — 2 cols (2:3), main spans 2 rows -->
            <div class="slide" data-anchor="ch0p1">
                <div class="page-inner">
                    <div class="g g-ch0p1">
                        <div class="cell main">main1<small>page2 · section1</small></div>
                        <div class="cell sub">sub1<small>page2 · section1</small></div>
                        <div class="cell sub">sub2<small>page2 · section1</small></div>
                    </div>
                </div>
            </div>

            <!-- Ch1 P1: CYAN — 3 equal cols, 1 section -->
            <div class="slide" data-anchor="ch1p1">
                <div class="page-inner">
                    <div class="g g-ch1p1">
                        <div class="cell">main1<small>page2 · section1</small></div>
                        <div class="cell">main2<small>page2 · section1</small></div>
                        <div class="cell">main3<small>page2 · section1</small></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullpage.js@4/dist/fullpage.min.js"></script>
    <script>
    (function() {
        'use strict';

        /* ── Chapter/Page data ── */
        var CHAPTERS = [
            { name: 'intro', color: '#bbb' },
            { name: '0',     color: '#3cb371' }
        ];
        var PAGES = 2;

        /* ── State ── */
        var ch = 0, pg = 0, busy = false;

        /* ── DOM ── */
        var lTL = document.getElementById('l-tl');
        var lTR = document.getElementById('l-tr');
        var lBL = document.getElementById('l-bl');
        var lBR = document.getElementById('l-br');
        var cTL = document.getElementById('c-tl');
        var cTR = document.getElementById('c-tr');
        var cBL = document.getElementById('c-bl');
        var cBR = document.getElementById('c-br');
        var posEl = document.getElementById('pos');
        var flashEl = document.getElementById('flash');

        /* ── Init fullpage ── */
        new fullpage('#fullpage', {
            licenseKey: 'gplv3-license',
            scrollingSpeed: 800,
            css3: true,
            easingcss3: 'cubic-bezier(0.16, 1, 0.3, 1)',
            loopHorizontal: false,
            verticalCentered: false,
            controlArrows: false,
            navigation: false,
            slidesNavigation: false,
            keyboardScrolling: false,
            fitToSection: true,
            autoScrolling: true,

            onLeave:      function() { busy = true; },
            onSlideLeave: function() { busy = true; },
            afterLoad: function(o, dest) {
                busy = false;
                pg = dest.index;
                var as = dest.item.querySelector('.slide.active');
                if (as) {
                    var sl = dest.item.querySelectorAll('.slide');
                    for (var i = 0; i < sl.length; i++) { if (sl[i] === as) { ch = i; break; } }
                } else ch = 0;
                updateUI();
            },
            afterSlideLoad: function(section, origin, dest) {
                busy = false;
                pg = section.index;
                ch = dest.index;
                updateUI();
            }
        });

        /* Disable built-in scroll — we handle everything */
        fullpage_api.setAllowScrolling(false);

        /* ── Navigation ── */
        function goRight() {
            if (busy) return;
            if (ch >= CHAPTERS.length - 1) { flash('right'); return; }
            fullpage_api.moveSlideRight();
        }
        function goLeft() {
            if (busy) return;
            if (ch <= 0) { flash('left'); return; }
            fullpage_api.moveSlideLeft();
        }
        function goDown() {
            if (busy) return;
            if (pg >= PAGES - 1) { flash('bottom'); return; }
            fullpage_api.moveTo(pg + 2, ch); /* section 1-based, slide 0-based */
        }
        function goUp() {
            if (busy) return;
            if (pg <= 0) { flash('top'); return; }
            fullpage_api.moveTo(pg, ch);
        }

        /* ── Keyboard: ←→ = chapters, ↑↓ = pages ── */
        document.addEventListener('keydown', function(e) {
            if (busy) return;
            switch (e.key) {
                case 'ArrowRight': e.preventDefault(); goRight(); break;
                case 'ArrowLeft':  e.preventDefault(); goLeft();  break;
                case 'ArrowDown':  e.preventDefault(); goDown();  break;
                case 'ArrowUp':    e.preventDefault(); goUp();    break;
            }
        });

        /* ── Mouse wheel: Y = pages, X = chapters ── */
        var wheelLock = false;
        document.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (busy || wheelLock) return;
            wheelLock = true;
            setTimeout(function() { wheelLock = false; }, 900);

            var ax = Math.abs(e.deltaX), ay = Math.abs(e.deltaY);
            if (ay >= ax) {
                if (e.deltaY > 0) goDown(); else goUp();
            } else {
                if (e.deltaX > 0) goRight(); else goLeft();
            }
        }, { passive: false });

        /* ── Touch swipe ── */
        var tx = 0, ty = 0;
        document.addEventListener('touchstart', function(e) {
            tx = e.touches[0].clientX; ty = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', function(e) {
            var dx = e.changedTouches[0].clientX - tx;
            var dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) < 40 && Math.abs(dy) < 40) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx < 0) goRight(); else goLeft();
            } else {
                if (dy < 0) goDown(); else goUp();
            }
        }, { passive: true });

        /* ── Corner clicks ── */
        cTR.addEventListener('click', goRight);
        cBR.addEventListener('click', goLeft);
        cBL.addEventListener('click', goDown);
        cTL.addEventListener('click', goUp);

        /* ── Flash boundary ── */
        function flash(side) {
            flashEl.className = side;
            setTimeout(function() { flashEl.className = ''; }, 300);
        }

        /* ── Update UI ── */
        function updateUI() {
            /* TL: current page label (click = prev page ↑) */
            lTL.textContent = pg > 0 ? '↑ page ' + pg : 'page ' + (pg + 1);
            cTL.classList.toggle('off', pg <= 0);

            /* TR: next chapter (click = next chapter →) */
            if (ch < CHAPTERS.length - 1) {
                lTR.textContent = CHAPTERS[ch + 1].name;
                cTR.classList.remove('off');
            } else {
                lTR.textContent = 'end';
                cTR.classList.add('off');
            }

            /* BL: next page (click = next page ↓) */
            if (pg < PAGES - 1) {
                lBL.textContent = '↓ page ' + (pg + 2);
                cBL.classList.remove('off');
            } else {
                lBL.textContent = 'end';
                cBL.classList.add('off');
            }

            /* BR: prev chapter (click = prev chapter ←) */
            if (ch > 0) {
                lBR.textContent = CHAPTERS[ch - 1].name;
                cBR.classList.remove('off');
            } else {
                lBR.textContent = 'asche';
                cBR.classList.add('off');
            }

            /* Position indicator */
            posEl.textContent = CHAPTERS[ch].name + ' · page ' + (pg + 1) + '/' + PAGES +
                '  ←→ ch ' + (ch + 1) + '/' + CHAPTERS.length;
        }

        /* ── Resize ── */
        window.addEventListener('resize', function() {
            var sq = Math.min(window.innerWidth, window.innerHeight) / 4;
            document.documentElement.style.setProperty('--sq', sq + 'px');
        });
        var sq0 = Math.min(window.innerWidth, window.innerHeight) / 4;
        document.documentElement.style.setProperty('--sq', sq0 + 'px');

        /* Initial state */
        updateUI();

    })();
    </script>
</body>
</html>
