<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>autopoiesis</title>

    <!-- Layer Styles -->
    <link rel="stylesheet" href="content/css/style.css?v=37">
    <link rel="stylesheet" href="nav/nav.css?v=14">

    <style>
        /* === Global Reset & Base === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        body {
            position: fixed;
            top: 0;
            left: 0;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- ===== CONTENT LAYER (WebGL, z-index 1) ===== -->
    <div id="content-layer"></div>

    <!-- ===== FLASH OVERLAY (boundary feedback) ===== -->
    <div class="flash-overlay" id="flash"></div>

    <!-- ===== PAGE INFO BAR (debug only) ===== -->
    <div id="cds-info" style="display:none"></div>

    <!-- ===== LANDING PAGE ANIMATED STRIPES (ch0 p0 only) ===== -->
    <div id="landing-banners">
        <div id="landing-h" class="landing-banner-h">
            <div class="landing-stripe-h"></div>
            <div class="landing-h-text"><span id="landing-txt-h">projects</span></div>
        </div>
        <div id="landing-v" class="landing-banner-v">
            <div class="landing-stripe-v"></div>
            <span id="landing-txt-v">pages</span>
        </div>
    </div>

    <!-- ===== NAVIGATION LAYER (Vordergrund, z-index 100) ===== -->
    <div id="nav-viewport"></div>

    <!-- ===== CDS CONTROL PANEL (only shown with ?debug) ===== -->
    <button id="cds-toggle" title="CDS Control Panel" style="display:none">⚙</button>
    <div id="cds-panel">
        <h4>🔧 CDS Control Panel</h4>
        <div class="cp-row"><span>Build:</span> <span id="cp-version" class="cp-status">—</span></div>
        <div class="cp-row"><span>Library:</span> <span id="cp-library" class="cp-status">—</span></div>
        <div class="cp-row"><span>Nav 3D:</span> <span id="cp-nav" class="cp-status">—</span></div>
        <div class="cp-row"><span>CDS WebGL:</span> <span id="cp-content" class="cp-status">—</span></div>
        <div class="cp-row"><span>GLB Models:</span> <span id="cp-glb" class="cp-status">—</span></div>
        <hr>
        <h4>👁 3D Layers</h4>
        <div class="cp-row"><label><input type="checkbox" id="cp-frames3d" checked> Frames (3D GLB)</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-beams3d" checked> Beams (3D GLB)</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-images" checked> Images / Video</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-netz3d" checked> Netz (3D quads)</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-pets" checked> Pets</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-outlines-content" checked> Grid: Content</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-outlines-nav" checked> Grid: Nav Corners</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-outlines-beam" checked> Grid: Beams</label></div>
        <hr>
        <h4>🏗 Basis Layers</h4>
        <div class="cp-row"><label><input type="checkbox" id="cp-cds-layer" checked> CDS Canvas</label></div>
        <div class="cp-row"><label><input type="checkbox" id="cp-nav-layer" checked> Nav 3D (Letters)</label></div>
        <hr>
        <div class="color-legend">
            <span class="cl-main">Main</span>
            <span class="cl-sub">Sub</span>
            <span class="cl-beam">Beam</span>
            <span class="cl-netz">Netz</span>
            <span class="cl-pet">Pet</span>
            <span class="cl-nav">Nav</span>
        </div>
        <hr>
        <div id="cp-log" class="cp-status" style="word-break:break-all;max-height:80px;overflow-y:auto;"></div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <!-- Three.js (ES Module Build via Import Map) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
        }
    }
    </script>

    <!-- All ES Modules (import map above resolves three) -->
    <script type="module" src="content/js/app.js?v=59"></script>
    <script type="module" src="nav/nav.js?v=32"></script>

    <!-- ===== CDS CONTROL PANEL LOGIC ===== -->
    <script>
    (function(){
        'use strict';
        var BUILD = '2025-06-26-v55';

        /* ── Only show panel if ?debug is in the URL ── */
        var isDebug = new URLSearchParams(location.search).has('debug');

        /* ── DOM refs ── */
        var panel  = document.getElementById('cds-panel');
        var toggle = document.getElementById('cds-toggle');
        var log    = document.getElementById('cp-log');

        if (isDebug && toggle) toggle.style.display = '';
        if (isDebug) {
            var infoBar = document.getElementById('cds-info');
            if (infoBar) infoBar.style.display = '';
        }

        /* ── Toggle panel open/close ── */
        if (toggle && panel) {
            toggle.addEventListener('click', function() {
                panel.classList.toggle('open');
                if (panel.classList.contains('open')) refreshStatus();
            });
        }

        /* ── Status helpers ── */
        function setStatus(id, text, state) {
            var el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = 'cp-status ' + (state === true ? 'cp-ok' : state === 'warn' ? 'cp-warn' : 'cp-err');
        }

        function addLog(msg) {
            if (!log) return;
            var line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
            log.insertBefore(line, log.firstChild);
            while (log.children.length > 20) log.removeChild(log.lastChild);
        }

        function refreshStatus() {
            setStatus('cp-version', BUILD, true);
            if (typeof LIBRARY !== 'undefined') {
                setStatus('cp-library', LIBRARY.length + ' chapters', true);
            } else {
                setStatus('cp-library', 'MISSING', false);
            }
            if (typeof ContentLayer !== 'undefined' && ContentLayer.getState) {
                var st = ContentLayer.getState();
                setStatus('cp-content', 'Ch' + st.chapter + ' P' + st.page, true);
            } else {
                setStatus('cp-content', 'NOT READY', 'warn');
            }
            setStatus('cp-nav', (typeof NavLayer !== 'undefined') ? 'OK' : 'NOT LOADED',
                      (typeof NavLayer !== 'undefined') ? true : false);
            var canvas = document.getElementById('cds-canvas');
            setStatus('cp-glb', canvas ? 'Canvas OK' : 'No canvas', canvas ? true : 'warn');
        }

        setTimeout(refreshStatus, 500);
        setTimeout(refreshStatus, 3000);

        /* ── Error catcher ── */
        window.addEventListener('error', function(e) {
            var src = (e.filename || '').split('/').pop();
            addLog('❌ ' + e.message + ' @ ' + src + ':' + e.lineno);
            if (panel) panel.classList.add('open');
        });
        window.addEventListener('unhandledrejection', function(e) {
            addLog('❌ Promise: ' + (e.reason ? (e.reason.message || String(e.reason)) : '?'));
            if (panel) panel.classList.add('open');
        });

        /* ═══════════════════════════════════════════════
           3D LAYER VISIBILITY TOGGLES
           Direct, explicit wiring — no mapping object.
           ═══════════════════════════════════════════════ */
        function wire(checkboxId, layerKey) {
            var cb = document.getElementById(checkboxId);
            if (!cb) { console.warn('[CP] Missing checkbox:', checkboxId); return; }
            cb.addEventListener('change', function() {
                if (window.ContentLayer && ContentLayer.updateLayerVisibility) {
                    ContentLayer.updateLayerVisibility(layerKey, cb.checked);
                }
            });
        }

        wire('cp-frames3d',         'frames3d');
        wire('cp-beams3d',          'beams3d');
        wire('cp-images',           'images');
        wire('cp-netz3d',           'netz3d');
        wire('cp-pets',             'pets');
        wire('cp-outlines-content', 'outlines_content');
        wire('cp-outlines-nav',     'outlines_nav');
        wire('cp-outlines-beam',    'outlines_beam');

        /* ── Basis layer toggles ── */
        var cbCds = document.getElementById('cp-cds-layer');
        var cbNav = document.getElementById('cp-nav-layer');
        if (cbCds) cbCds.addEventListener('change', function() {
            var el = document.getElementById('content-layer');
            if (el) el.style.display = this.checked ? '' : 'none';
        });
        if (cbNav) cbNav.addEventListener('change', function() {
            var el = document.getElementById('nav-viewport');
            if (el) el.style.display = this.checked ? '' : 'none';
        });

        addLog('Panel ready – ' + BUILD);
    })();
    </script>

</body>
</html>
